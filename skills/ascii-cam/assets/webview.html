<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ASCII Cam</title>
    <style>
      :root { --accent: #00f2fe; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: #000; color: #eee; overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #stage { position: relative; width: 100vw; height: 100vh; display: grid; }
      /* live camera preview */
      video {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; transform: scaleX(-1); background: #111;
      }
      /* rendered ASCII art */
      #art {
        position: absolute; inset: 0; margin: 0; background: #000;
        display: none; align-content: center; justify-content: center;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        line-height: 1; white-space: pre; letter-spacing: 0;
        overflow: hidden; user-select: none;
      }
      #word {
        position: absolute; left: 50%; bottom: 14%; transform: translateX(-50%) rotate(-4deg);
        display: none; padding: 10px 22px; border-radius: 50px; z-index: 5;
        font-weight: 900; text-transform: uppercase; letter-spacing: 2px; white-space: nowrap;
        color: #000; background: var(--accent); box-shadow: 0 8px 28px rgba(0,0,0,.55);
        font-size: clamp(20px, 7vw, 52px);
      }
      #status {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 6;
        background: rgba(0,0,0,.6); color: var(--accent); padding: 7px 14px; border-radius: 8px;
        font-size: 13px; max-width: 90vw; text-align: center;
      }
      #controls {
        position: absolute; bottom: 26px; left: 0; right: 0; z-index: 6;
        display: flex; gap: 14px; justify-content: center; align-items: center;
      }
      button {
        font: inherit; font-weight: 700; border: 0; border-radius: 40px; padding: 14px 26px;
        background: var(--accent); color: #001014; box-shadow: 0 6px 20px rgba(0,0,0,.5);
      }
      button.ghost { background: rgba(255,255,255,.14); color: #fff; }
      button:disabled { opacity: .4; }
      canvas { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="cam" autoplay playsinline muted></video>
      <pre id="art"></pre>
      <div id="word"></div>
      <div id="status">Starting camera…</div>
      <div id="controls">
        <button id="capture" disabled>Capture</button>
        <button id="retake" class="ghost" style="display:none">Retake</button>
      </div>
      <canvas id="sample"></canvas>
    </div>

    <script>
      // Lightest -> densest coverage. On a black background, brighter pixels map to denser,
      // more visible glyphs and dark pixels fade to spaces.
      const RAMP = " .:-=+*#%@";
      const WORDS = [
        "VIBES", "GLITCH", "RADICAL", "NEON", "PIXEL", "DREAM", "CHAOS", "STATIC",
        "RETRO", "COSMIC", "FUZZY", "ECHO", "PRISM", "ZAP", "LO-FI", "WONDER",
        "FRACTAL", "GHOST", "SODA", "TURBO", "MIRAGE", "VAPOR", "BLOOM", "NOVA",
      ];
      const PALETTES = [
        "#00f2fe", "#ff2e97", "#ffe600", "#7CFF6B", "#ff7a00", "#b06bff", "#ff5252",
      ];

      const params = new URLSearchParams(location.search);
      const forcedWord = (params.get("word") || "").trim();

      const video = document.getElementById("cam");
      const artEl = document.getElementById("art");
      const wordEl = document.getElementById("word");
      const statusEl = document.getElementById("status");
      const captureBtn = document.getElementById("capture");
      const retakeBtn = document.getElementById("retake");
      const canvas = document.getElementById("sample");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const esc = (c) => (c === "<" ? "&lt;" : c === ">" ? "&gt;" : c === "&" ? "&amp;" : c);

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
          });
          video.srcObject = stream;
          await video.play().catch(() => {});
          video.onloadeddata = () => {
            statusEl.textContent = "Tap Capture to make ASCII art";
            captureBtn.disabled = false;
          };
        } catch (err) {
          // Fall back to any camera if the rear camera isn't available.
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            await video.play().catch(() => {});
            captureBtn.disabled = false;
            statusEl.textContent = "Tap Capture to make ASCII art";
          } catch (e2) {
            statusEl.textContent = "Camera unavailable: " + e2.message;
          }
        }
      }

      // Sample the current frame down to a character grid and emit colored ASCII.
      function renderAscii() {
        const vw = video.videoWidth || 640;
        const vh = video.videoHeight || 480;
        if (!vw || !vh) return;

        // Fit the art to the viewport. Monospace cells are ~2x taller than wide, so the
        // vertical sample count is halved to keep proportions correct.
        const cols = Math.max(48, Math.min(110, Math.floor(window.innerWidth / 6)));
        const cellAspect = 0.5;
        const rows = Math.max(24, Math.round((cols * (vh / vw)) * cellAspect));

        canvas.width = cols;
        canvas.height = rows;
        // Mirror to match the (mirrored) preview the user saw.
        ctx.save();
        ctx.translate(cols, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, cols, rows);
        ctx.restore();

        const { data } = ctx.getImageData(0, 0, cols, rows);
        let html = "";
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            const i = (y * cols + x) * 4;
            const r = data[i], g = data[i + 1], b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b; // 0..255
            const ch = RAMP[Math.min(RAMP.length - 1, Math.floor((lum / 256) * RAMP.length))];
            // Boost saturation a touch so the ASCII reads as colorful, not muddy.
            const cr = Math.min(255, Math.round(r * 1.15 + 12));
            const cg = Math.min(255, Math.round(g * 1.15 + 12));
            const cb = Math.min(255, Math.round(b * 1.15 + 12));
            html += `<span style="color:rgb(${cr},${cg},${cb})">${esc(ch)}</span>`;
          }
          html += "\n";
        }
        artEl.innerHTML = html;

        // Size the monospace font so the whole grid fits the screen.
        const fontPx = Math.max(4, Math.floor(window.innerWidth / (cols * 0.62)));
        artEl.style.fontSize = fontPx + "px";

        // Random accent color + word stamp.
        const accent = pick(PALETTES);
        document.documentElement.style.setProperty("--accent", accent);
        wordEl.textContent = forcedWord || pick(WORDS);
      }

      function capture() {
        renderAscii();
        const stream = video.srcObject;
        if (stream) stream.getTracks().forEach((t) => t.stop());
        video.style.display = "none";
        artEl.style.display = "grid";
        wordEl.style.display = "block";
        statusEl.style.display = "none";
        captureBtn.style.display = "none";
        retakeBtn.style.display = "inline-block";
      }

      function retake() {
        artEl.style.display = "none";
        wordEl.style.display = "none";
        statusEl.style.display = "block";
        statusEl.textContent = "Starting camera…";
        captureBtn.style.display = "inline-block";
        captureBtn.disabled = true;
        retakeBtn.style.display = "none";
        video.style.display = "block";
        startCamera();
      }

      captureBtn.addEventListener("click", capture);
      retakeBtn.addEventListener("click", retake);
      startCamera();
    </script>
  </body>
</html>
